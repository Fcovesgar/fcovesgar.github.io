<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto  - Mi portfolio</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css" />
    <style>

      .intro {
        display: flex;
        align-items: center;
        gap: 3rem;
        background: #fff;
        border: 1px solid #e2e8f0;
        max-width: 900px;
        margin: 0 auto 1rem;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        padding: 3rem;
        flex-direction: column;
        text-align: center;
        padding: 2rem;
        gap: 1.5rem;
        padding: 2rem 5rem;
      }

      .intro img {
        width: 100px;
        height: 100px;
        object-fit: contain;
        transition: all 0.3s ease;
      }

      .intro img:hover {
        transform: rotate(15deg) scale(1.2);
      }

      .intro a {
        letter-spacing: 0.6px;
        font-weight: 600;
        font-size: 1.5rem;
        color: #2c3e50;
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .intro a:hover {
        transform: scale(1.2);
        color: #667eea;
      }

      .social-links-contact {
        display: flex;
        justify-content: center;
        gap: 2rem;
        margin-top: 2rem;
      }

      .social-links-contact a img {
        width: 60px;
        height: 60px;
        transition: all 0.3s ease;
      }

      .social-links-contact a img:hover {
        transform: rotate(15deg) scale(1.2);
      }

      .contact-container {
        cursor: pointer;
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      @media (max-width: 768px) {

        .intro {
            display: flex;
            align-items: center;
            gap: 3rem;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            padding: 3rem;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
            gap: 1.5rem;
            max-width: 20000px;
            margin: 0;
        }

        .intro img {
          width: 70px;
          height: 70px;
        }

        .social-links-contact a img {
            width: 50px;
            height: 50px;
        }

        .intro a {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>

  <body>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="sobre-mi.html">Sobre mí</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
    <div class="contact-container">
      <div class="intro" >
        <img href="mailto:fcovesgar@gmail.com" src="images/gmail.png" alt="Gmail" />
        <a href="mailto:fcovesgar@gmail.com">fcovesgar@gmail.com</a>
      </div>

      <div class="social-links-contact">
        <a title="Instagram" href="https://instagram.com/fcovesgar" target="_blank">
          <img src="images/instagram.png" alt="Instagram" />
        </a>

        <a title="GitHub" href="https://github.com/fcovesgar" target="_blank">
          <img src="images/github.png" alt="GitHub" />
        </a>

        <a title="LinkedIn" href="https://linkedin.com/in/pacocovgar" target="_blank">
          <img src="images/linkedin.png" alt="LinkedIn" />
        </a>
      </div>
    </div>
  </body>
</html>
